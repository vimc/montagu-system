name: api
on:
  push:
    branches: [ main ]
    tags: [ v* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: ~

defaults:
  run:
    working-directory: ./api/src
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
         registry: ghcr.io
         username: ${{ github.actor }}
         password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.4.2'
      - name: Install libsodium
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libsodium23
      - name: Check schema
        run: ./gradlew :validateSchema -i
      - name: Run test dependencies
        # NB These scripts currently run main/master images - we should eventually provide at least the option to run against
        # It's weird that the API is its own dep, but we do need to run the api in order to run the proxy in order to test
        # against packit and the task queue...
        working-directory: ./api/scripts
        run: |
          ./start-dependencies.sh
      - name: Add test user
        run: |
            ./gradlew :generateTestData:installDist
            ./gradlew :userCLI:installDist
            ./generateTestData/addTestUser.sh
      - name: Run tests
        run: ./gradlew :testLibrary
      - name: Upload api database test output
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: api-database-test-report
          path: api/src/databaseTests/build/reports/tests/test/

