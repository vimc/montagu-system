name: API Build and Test
on:
  push:
    branches: [ main ]
    tags: [ v* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: ~

defaults:
  run:
    working-directory: ./api/src
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
         registry: ghcr.io
         username: ${{ github.actor }}
         password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata for Docker (api)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/vimc/montagu-api
          tags: |
            type=raw,value=latest,enable={{ is_default_branch }}
            type=raw,value=${{ github.head_ref }},enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=branch
            type=sha,prefix=
      - name: Extract metadata for Docker (cli)
        id: meta-cli
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/vimc/montagu-cli
          tags: |
            type=raw,value=latest,enable={{ is_default_branch }}
            type=raw,value=${{ github.head_ref }},enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=branch
            type=sha,prefix=
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.4.2'
      - name: Install libsodium
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libsodium23
      - name: Check schema
        run: ./gradlew :validateSchema -i
      - name: Run test dependencies
        # NB These scripts currently run main/master images - we should eventually provide at least the option to run against
        # It's weird that the API is its own dep, but we do need to run the api in order to run the proxy in order to test
        # against packit and the task queue...
        working-directory: ./api/scripts
        run: |
          ./start-dependencies.sh
      - name: Run unit and integration tests
        run: ./gradlew :testLibrary
      - name: Build api dist
        run: ./gradlew :app:distTar
      - name: Build and push (api)
        uses: docker/build-push-action@v6
        with:
          pull: true
          push: true
          file: ./api/src/app/Dockerfile
          context: ./api
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
      - name: Build cli dist
        run: ./gradlew :userCLI:distTar
      - name: Build and push (cli)
        uses: docker/build-push-action@v6
        with:
          pull: true
          push: true
          file: ./api/src/userCLI/Dockerfile
          context: ./api
          tags: ${{ steps.meta-cli.outputs.tags }}
          labels: ${{ steps.meta-cli.outputs.labels }}
          annotations: ${{ steps.meta-cli.outputs.annotations }}

